networks:
  ott-platform-net:
    name: ott-platform-net
    driver: bridge

volumes:
  postgres-data:
  nginx-cache:

services:
  # ─── Database Services ──────────────────────────────────
  database:
    image: postgres:14-alpine
    container_name: ott-postgres-prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ott-platform-net

  redis:
    image: redis:6.2-alpine
    container_name: ott-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ott-platform-net

  # ─── Backend Services ───────────────────────────────────
  user-backend:
    build:
      context: ../user-backend
      target: production
    container_name: ott-user-backend-prod
    expose:
      - "8002"
    environment:
      - NODE_ENV=production
      - PORT=8002
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - ott-platform-net

  admin-backend:
    build:
      context: ../admin-backend
      target: production
    container_name: ott-admin-backend-prod
    expose:
      - "8003"
    environment:
      - NODE_ENV=production
      - PORT=8003
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_SECRET=${ADMIN_SECRET}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - ott-platform-net

  # ─── Frontend Services ──────────────────────────────────
  user-frontend:
    build:
      context: ../user-frontend
      target: final
    container_name: ott-user-frontend-prod
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=https://api.ott-platform.com
    restart: always
    networks:
      - ott-platform-net

  admin-frontend:
    build:
      context: ../admin-frontend
      target: final
    container_name: ott-admin-frontend-prod
    expose:
      - "4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - NEXT_PUBLIC_ADMIN_API_URL=https://admin-api.ott-platform.com
    restart: always
    networks:
      - ott-platform-net

  # ─── Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ott-nginx-prod
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - user-frontend
      - admin-frontend
      - user-backend
      - admin-backend
    restart: always
    networks:
      - ott-platform-net
