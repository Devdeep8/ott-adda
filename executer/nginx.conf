user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 5120M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=50r/s;

    # ─── User Frontend ──────────────────────────────────────
    upstream user_frontend {
        server user-frontend:3000;
    }

    # ─── Admin Frontend ─────────────────────────────────────
    upstream admin_frontend {
        server admin-frontend:4001;
    }

    # ─── User Backend ───────────────────────────────────────
    upstream user_backend {
        server user-backend:8002;
    }

    # ─── Admin Backend ──────────────────────────────────────
    upstream admin_backend {
        server admin-backend:8003;
    }

    # ─── HTTP Redirect ──────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect to HTTPS in production (uncomment for SSL)
        # return 301 https://$server_name$request_uri;

        # Development: serve directly over HTTP
        location / {
            return 301 http://localhost:3000$request_uri;
        }
    }

