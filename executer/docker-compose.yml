networks:
  ott-platform-net:
    name: ott-platform-net
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  pgadmin-data:
  redisinsight-data:

services:
  # ─── Database Services ──────────────────────────────────
  database:
    image: postgres:14-alpine
    container_name: ott-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ott_db_pass
      POSTGRES_DB: ott_platform_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ott-platform-net

  redis:
    image: redis:6.2-alpine
    container_name: ott-redis
    command: redis-server --requirepass "ott_redis_pass"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ott-platform-net

  # ─── Development Tools ──────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: ott-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    restart: unless-stopped
    networks:
      - ott-platform-net

  pg-admin:
    image: dpage/pgadmin4
    container_name: ott-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ott-platform.com
      PGADMIN_DEFAULT_PASSWORD: ott_pg_pass
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5480:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - database
    networks:
      - ott-platform-net

  # ─── Backend Services ───────────────────────────────────
  user-backend:
    build:
      context: ../user-backend
      target: builder
    container_name: ott-user-backend
    command: npm run dev
    stdin_open: true
    tty: true
    volumes:
      - ../user-backend:/home/node/app
      - /home/node/app/node_modules
    ports:
      - "8002:8002"
    env_file: ../user-backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:ott_db_pass@database:5432/ott_platform_db
      - REDIS_URL=redis://:ott_redis_pass@redis:6379
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ott-platform-net

  admin-backend:
    build:
      context: ../admin-backend
      target: builder
    container_name: ott-admin-backend
    command: npm run dev
    stdin_open: true
    tty: true
    volumes:
      - ../admin-backend:/home/node/app
      - /home/node/app/node_modules
    ports:
      - "8003:8003"
    env_file: ../admin-backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:ott_db_pass@database:5432/ott_platform_db
      - REDIS_URL=redis://:ott_redis_pass@redis:6379
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ott-platform-net

  # ─── Frontend Services ──────────────────────────────────
  user-frontend:
    build:
      context: ../user-frontend
      target: base
    container_name: ott-user-frontend
    command: npm run dev
    stdin_open: true
    tty: true
    volumes:
      - ../user-frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: ../user-frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8002
    depends_on:
      - user-backend
    restart: unless-stopped
    networks:
      - ott-platform-net

  admin-frontend:
    build:
      context: ../admin-frontend
      target: base
    container_name: ott-admin-frontend
    command: npm run dev
    stdin_open: true
    tty: true
    volumes:
      - ../admin-frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    env_file: ../admin-frontend/.env.local
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=http://localhost:8003
    depends_on:
      - admin-backend
    restart: unless-stopped
    networks:
      - ott-platform-net
